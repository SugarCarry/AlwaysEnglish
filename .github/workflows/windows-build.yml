name: Windows Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build Windows portable package
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.6.3"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2019_64"
          modules: "qt5compat qtshadertools"
          cache: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DGIT_SEMVER=0.1.${{ github.run_number }}

      - name: Build
        run: cmake --build build --target AlwaysEnglish --parallel

      - name: Deploy Qt runtime
        run: cmake --build build --target Script-DeployRelease

      - name: Check package
        shell: pwsh
        run: |
          if (!(Test-Path "dist/AlwaysEnglish.exe")) {
            throw "dist/AlwaysEnglish.exe was not generated."
          }
          Get-ChildItem -Path dist

      - name: Build installer
        shell: pwsh
        working-directory: package
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          }
          $outputDir = Join-Path $env:GITHUB_WORKSPACE "artifacts"
          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null
          & $iscc "/O$outputDir" "/FAlwaysEnglish-installer" InstallerScript.iss
          $installerPath = Join-Path $outputDir "AlwaysEnglish-installer.exe"
          if (!(Test-Path $installerPath)) {
            Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -Filter "*.exe" | Select-Object FullName
            throw "$installerPath was not generated."
          }

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: AlwaysEnglish-windows-portable
          path: dist
          if-no-files-found: error

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: AlwaysEnglish-windows-installer
          path: artifacts/AlwaysEnglish-installer.exe
          if-no-files-found: error
